<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskTime - Setup Your Workspace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        body { 
            background: linear-gradient(135deg, #0f111a 0%, #1a1c23 50%, #222631 100%); 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; 
            font-family: 'Outfit', sans-serif; color: white; padding: 20px;
        }
        .setup-card { 
            background: rgba(26, 28, 35, 0.95); backdrop-filter: blur(20px); 
            border-radius: 24px; padding: 3rem; width: 100%; max-width: 480px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(0,212,170,0.2); 
            position: relative; overflow: hidden;
        }
        .form-control-custom { 
            border-radius: 0 12px 12px 0; padding: 14px 18px; border: 2px solid #2d303e; 
            background-color: #161821 !important; color: #ffffff !important; font-weight: 500; transition: 0.3s;
        }
        .form-control-custom:focus { 
            border-color: #00d4aa; box-shadow: none; outline: none; background-color: #1a1c23 !important; color: #ffffff !important;
        }
        .form-control-custom::placeholder { color: #8b949e !important; }
        .form-control-custom:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #161821 inset !important;
            -webkit-text-fill-color: white !important; transition: background-color 5000s ease-in-out 0s;
        }
        .input-group:focus-within .input-group-text, .input-group:focus-within .form-control-custom { border-color: #00d4aa; }
        .input-group:focus-within { box-shadow: 0 0 0 4px rgba(0, 212, 170, 0.15); border-radius: 12px; }
        .input-group-text { background-color: #161821 !important; color: #8b949e !important; border: 2px solid #2d303e; border-right: none; border-radius: 12px 0 0 12px; transition: 0.3s; }
        .badge-role { background: rgba(0, 212, 170, 0.1); color: #00d4aa; border: 1px solid rgba(0,212,170,0.3); padding: 6px 15px; font-size: 0.85rem; letter-spacing: 1px; }

        /* Light Mode Overrides for Auth */
        body.light-mode { background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 50%, #fce7f3 100%); color: #1a1c23; }
        body.light-mode .setup-card { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 25px 50px rgba(0,0,0,0.05); }
        body.light-mode .form-control-custom, body.light-mode .input-group-text { background-color: #f8fafc !important; color: #1a1c23 !important; border-color: #e2e8f0; }
        body.light-mode .form-control-custom:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #f8fafc inset !important; -webkit-text-fill-color: #1a1c23 !important; }
        body.light-mode .text-white { color: #1a1c23 !important; }
    </style>
</head>
<body>

    <div class="setup-card">
        <div class="text-center mb-4 pb-2 border-bottom border-secondary border-opacity-25">
            <h2 class="fw-bold mb-1" style="font-family: 'Playfair Display', serif; color: #00d4aa;">DeskTime</h2>
            <p class="text-muted small text-uppercase letter-spacing-1 mb-3">Workspace Invitation</p>
            
            <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
                <i class="bi bi-envelope-check text-success fs-5"></i>
                <span class="fw-bold fs-6">{{ invite.email }}</span>
            </div>
            <span class="badge rounded-pill badge-role text-uppercase"><i class="bi bi-briefcase-fill me-1"></i> Role: {{ invite.role }}</span>
        </div>

        {% if error %}
        <div class="alert alert-danger rounded-3 bg-danger bg-opacity-10 text-danger fw-bold small text-center mb-4 border-0">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold text-white small opacity-75">Create your Login ID (Username)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                    <input type="text" name="username" class="form-control form-control-custom" placeholder="e.g. rohan_hr" required autofocus autocomplete="off">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold text-white small opacity-75">Set a Secure Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" name="password" class="form-control form-control-custom" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <div class="form-text mt-2" style="color: #8b949e; font-size: 0.75rem;"><i class="bi bi-info-circle me-1"></i> Make it strong. You'll need this for the Desktop Agent.</div>
            </div>

            <button type="submit" class="btn w-100 py-3 rounded-pill fw-bold shadow-lg mt-2" style="background: #00d4aa; color: #161821; font-size: 1.1rem; border: none; transition: 0.3s;">
                Complete Setup & Login <i class="bi bi-arrow-right-circle-fill ms-2"></i>
            </button>
        </form>
        
        <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
            <p class="mb-0 opacity-75" style="font-size: 0.75rem;"><i class="bi bi-lock-fill me-1 text-success"></i> Secure 256-bit Encrypted Setup</p>
        </div>
    </div>

    <script>
        fetch('/api/get_config').then(r => r.json()).then(data => {
            localStorage.setItem('desktime_theme', data.theme);
            if(data.theme === 'light') { document.body.classList.add('light-mode'); } 
            else { document.body.classList.remove('light-mode'); }
        });
    </script>
</body>
</html>
